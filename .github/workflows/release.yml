name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: 386
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            ext: ""
          # macOS
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          # Windows
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: 386
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.goarm }}" ]; then
            BIN_NAME=gomap-${{ matrix.goos }}-${{ matrix.goarch }}v${{ matrix.goarm }}${{ matrix.ext }}
          else
            BIN_NAME=gomap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          fi
          go build -o dist/${BIN_NAME} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gomap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: dist/*

  github-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILE="docs/release-notes/${TAG}-zh.md"

          if [ ! -f "$FILE" ]; then
            echo "::error::Release notes file not found: $FILE"
            exit 1
          fi

          echo "body_path=$FILE" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          find dist -type f -maxdepth 3 -print0 | sort -z | xargs -0 sha256sum > dist/checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release_notes.outputs.body_path }}
          files: |
            dist/**
