name: elasticsearch
aliases:
  - elastic
ports:
  - 9200
capabilities:
  credential: true
  unauthorized: false
  enrichment: false
policy_tags:
  lockout_risk: medium
  auth_family: password
  transport: http
dictionary:
  default_users:
    - elastic
    - admin
    - kibana
  password_source: builtin:passwords/global
  extra_passwords:
    - elastic
    - elastic123
  default_tiers:
    - top
    - common
  allow_empty_username: false
  allow_empty_password: false
  expansion_profile: static_basic
results:
  credential_success_type: credential_valid
  unauthorized_success_type: unauthorized_access
  evidence_profile: default
templates:
  unauthorized: ""
