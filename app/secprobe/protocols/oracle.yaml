name: oracle
aliases:
  - oracle-tns
ports:
  - 1521
capabilities:
  credential: true
  unauthorized: false
  enrichment: false
policy_tags:
  lockout_risk: medium
  auth_family: password
  transport: tcp
dictionary:
  default_users:
    - sys
    - system
    - admin
    - test
    - web
    - orcl
  password_source: builtin:passwords/global
  default_pairs:
    - username: scott
      password: tiger
    - username: system
      password: manager
    - username: sys
      password: sys
  default_tiers:
    - top
    - common
  allow_empty_username: false
  allow_empty_password: false
  expansion_profile: static_basic
results:
  credential_success_type: credential_valid
  evidence_profile: oracle_basic
