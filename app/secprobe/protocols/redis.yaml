name: redis
aliases:
  - redis/ssl
  - redis/tls
ports:
  - 6379
capabilities:
  credential: true
  unauthorized: true
  enrichment: true
policy_tags:
  lockout_risk: low
  auth_family: password
  transport: tcp
dictionary:
  default_users:
    - ""
  password_source: builtin:passwords/global
  extra_passwords:
    - redis
    - default
  default_tiers:
    - top
    - common
  allow_empty_username: true
  allow_empty_password: true
  expansion_profile: static_basic
results:
  credential_success_type: credential_valid
  unauthorized_success_type: unauthorized_access
  evidence_profile: redis_basic
