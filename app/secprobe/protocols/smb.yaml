name: smb
aliases:
  - cifs
ports:
  - 445
  - 139
capabilities:
  credential: true
  unauthorized: false
  enrichment: false
policy_tags:
  lockout_risk: high
  auth_family: password
  transport: tcp
dictionary:
  default_users:
    - administrator
    - admin
    - guest
  password_source: builtin:passwords/global
  default_tiers:
    - top
    - common
  allow_empty_username: false
  allow_empty_password: false
  expansion_profile: static_basic
results:
  credential_success_type: credential_valid
  evidence_profile: smb_basic
