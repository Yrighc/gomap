name: mongodb
aliases:
  - mongo
ports:
  - 27017
capabilities:
  credential: true
  unauthorized: true
  enrichment: true
policy_tags:
  lockout_risk: medium
  auth_family: password
  transport: tcp
dictionary:
  default_sources:
    - mongodb
    - mongo
  allow_empty_username: false
  allow_empty_password: false
  expansion_profile: static_basic
results:
  credential_success_type: credential_valid
  unauthorized_success_type: unauthorized_access
  evidence_profile: mongodb_basic
