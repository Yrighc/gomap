name: amqp
aliases:
  - amqps
ports:
  - 5672
  - 5671
capabilities:
  credential: true
  unauthorized: false
  enrichment: false
policy_tags:
  lockout_risk: medium
  auth_family: password
  transport: tcp
dictionary:
  default_users:
    - guest
    - admin
    - administrator
    - rabbit
    - rabbitmq
    - root
  password_source: builtin:passwords/global
  default_pairs:
    - username: guest
      password: guest
  default_tiers:
    - top
    - common
  allow_empty_username: false
  allow_empty_password: false
  expansion_profile: static_basic
results:
  credential_success_type: credential_valid
  evidence_profile: amqp_basic
