name: smtp
aliases:
  - smtps
ports:
  - 25
  - 465
  - 587
capabilities:
  credential: true
  unauthorized: false
  enrichment: false
policy_tags:
  lockout_risk: medium
  auth_family: password
  transport: tcp
dictionary:
  default_users:
    - admin
    - root
    - postmaster
    - mail
    - smtp
    - administrator
  password_source: builtin:passwords/global
  default_tiers:
    - top
    - common
  allow_empty_username: false
  allow_empty_password: false
  expansion_profile: static_basic
results:
  credential_success_type: credential_valid
  evidence_profile: smtp_basic
