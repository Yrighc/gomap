name: postgresql
aliases:
  - postgres
  - pgsql
ports:
  - 5432
capabilities:
  credential: true
  unauthorized: false
  enrichment: true
policy_tags:
  lockout_risk: medium
  auth_family: password
  transport: tcp
dictionary:
  default_users:
    - postgres
    - admin
    - root
  password_source: builtin:passwords/global
  default_tiers:
    - top
    - common
  allow_empty_username: false
  allow_empty_password: false
  expansion_profile: static_basic
results:
  credential_success_type: credential_valid
  evidence_profile: postgresql_basic
