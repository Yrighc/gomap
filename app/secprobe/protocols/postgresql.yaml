name: postgresql
aliases:
  - postgres
  - pgsql
ports:
  - 5432
capabilities:
  credential: true
  unauthorized: false
  enrichment: false
policy_tags:
  lockout_risk: medium
  auth_family: password
  transport: tcp
dictionary:
  default_sources:
    - postgresql
    - postgres
  allow_empty_username: false
  allow_empty_password: false
  expansion_profile: static_basic
results:
  credential_success_type: credential_valid
  evidence_profile: postgresql_basic
